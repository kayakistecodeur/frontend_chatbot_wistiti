<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assistant IA Person</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1f2d;
      --navy-light: #162d40;
      --ocean: #1a4a6e;
      --wave: #2d7eb5;
      --foam: #e8f4f8;
      --gold: #c8a96e;
      --gold-light: #e8d5a3;
      --white: #f5f2ee;
      --text-dark: #0d1f2d;
      --text-muted: #6b8299;
      --radius: 18px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: transparent;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Bouton flottant ── */
    #chat-toggle {
      position: fixed;
      /* bottom: 28px;
      right: 28px;
      width: 62px;
      height: 62px; */
      border-radius: 50%;
      background: var(--navy);
      border: 2px solid var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(13,31,45,0.35);
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
      z-index: 1000;
    }
    #chat-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 10px rgba(13,31,45,0.5);
    }
    #chat-toggle svg { transition: opacity 0.2s, transform 0.2s; }
    #chat-toggle.open .icon-boat { opacity: 0; transform: scale(0.5); position: absolute; }
    #chat-toggle.open .icon-close { opacity: 1; transform: scale(1); }
    #chat-toggle .icon-close { opacity: 0; transform: scale(0.5); position: absolute; }


    /* Animation des bulles du chat */
    /* Base Layout & Sizing */
    .chat-logo-container {
      cursor: pointer;
    }

    .chat-logo {
      width: 55%;
      height: 55%;
    }

    /* Base Styles for SVG Elements */
    .chat-logo .bubble {
      fill: #0D1F2D; /* Blue chat bubble */
      transition: fill 0.3s ease;
    }

    .chat-logo .dot {
      fill: #0D1F2D; /* White dots */
      transform-origin: center;
    }

    /* Hover Effect: Change Bubble Color */
    .chat-logo-container:hover .bubble {
      fill: #0D1F2D; /* Darker blue on hover */
    }

    /* Hover Effect: Make Dots Animate/Bounce */
    .chat-logo-container:hover .dot {
      animation: wave 1.2s infinite ease-in-out;
    }

    /* Stagger the dots so they bounce one after another */
    .chat-logo-container:hover .dot-1 {
      animation-delay: 0s;
    }
    .chat-logo-container:hover .dot-2 {
      animation-delay: 0.2s;
    }
    .chat-logo-container:hover .dot-3 {
      animation-delay: 0.4s;
    }

    /* The Keyframe Animation for the Dots */
    @keyframes wave {
      0%, 60%, 100% {
        transform: translateY(0);
      }
      30% {
        transform: translateY(-4px); /* Moves the dot up */
      }
    }
    

    /* Badge notification */
    #notif-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: var(--gold);
      border-radius: 50%;
      border: 2px solid #fff;
      font-size: 10px;
      color: var(--navy);
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    #notif-badge.hidden { transform: scale(0); }

    /* ── Fenêtre chat ── */
    #chat-window {
      position: fixed;
      /* bottom: 104px;
      right: 28px;
      width: 370px;
      height: 560px; */
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(13,31,45,0.25), 0 0 0 1px rgba(200,169,110,0.2);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      transform: translateY(20px) scale(0.95);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.25s ease, visibility 0s linear 0.35s;
    }
    #chat-window.open {
      display: flex;
      transform: translateY(0) scale(1);
      opacity: 1;
      visibility: visible;
      pointer-events: all;
      transition-delay: 0s;
    }

    /* Header */
    .chat-header {
      background: var(--navy);
      padding: 18px 20px 16px;
      position: relative;
      overflow: hidden;
    }
    .chat-header::before {
      content: '';
      position: absolute;
      bottom: -30px;
      right: -20px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px solid rgba(200,169,110,0.15);
    }
    .chat-header::after {
      content: '';
      position: absolute;
      bottom: -50px;
      right: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 1px solid rgba(200,169,110,0.08);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--ocean);
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-info h3 {
      font-family: 'Playfair Display', serif;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status span {
      font-size: 11px;
      color: rgba(245,242,238,0.6);
      font-weight: 300;
    }
    .header-sub {
      font-size: 11px;
      color: var(--gold-light);
      font-weight: 300;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* Messages zone */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(13,31,45,0.12); border-radius: 4px; }

    /* Messages */
    .msg {
      max-width: 82%;
      animation: msg-in 0.3s cubic-bezier(.34,1.3,.64,1) both;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      line-height: 1.55;
    }
    .msg.bot .msg-bubble {
      background: #ffffff;
      color: var(--text-dark);
      border-radius: 4px var(--radius-sm) var(--radius-sm) var(--radius-sm);
      box-shadow: 0 2px 12px rgba(13,31,45,0.07);
      border: 1px solid rgba(13,31,45,0.06);
    }
    .msg.user .msg-bubble {
      background: var(--navy);
      color: var(--white);
      border-radius: var(--radius-sm) 4px var(--radius-sm) var(--radius-sm);
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg.user .msg-time { text-align: right; }

    /* Suggestions rapides */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .suggestion-chip {
      background: var(--foam);
      border: 1px solid rgba(45,126,181,0.2);
      color: var(--ocean);
      font-size: 11.5px;
      padding: 5px 11px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s, transform 0.15s;
      white-space: nowrap;
    }
    .suggestion-chip:hover {
      background: var(--ocean);
      color: #fff;
      transform: translateY(-1px);
    }

    /* Typing indicator */
    .typing-indicator {
      align-self: flex-start;
      background: #fff;
      border: 1px solid rgba(13,31,45,0.06);
      box-shadow: 0 2px 12px rgba(13,31,45,0.07);
      padding: 12px 16px;
      border-radius: 4px var(--radius-sm) var(--radius-sm) var(--radius-sm);
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input zone */
    .chat-footer {
      padding: 12px 14px 14px;
      background: #fff;
      border-top: 1px solid rgba(13,31,45,0.06);
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--foam);
      border: 1.5px solid rgba(13,31,45,0.1);
      border-radius: 14px;
      padding: 8px 8px 8px 14px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within {
      border-color: var(--wave);
    }
    #user-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      color: var(--text-dark);
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.5;
    }
    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--navy);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    #send-btn:hover { background: var(--ocean); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    .footer-note {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 0.02em;
    }
    .footer-note a { color: var(--wave); text-decoration: none; }
  </style>
</head>
<body>

<!-- Bouton flottant -->
<button id="chat-toggle" class="chat-logo-container" aria-label="Ouvrir le chat">
  <span id="notif-badge">1</span>
  <!-- Icône bateau -->
  <svg class="icon-boat chat-logo" width="22" height="24" viewBox="0 0 24 24" fill="none" stroke="#c8a96e" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">
    <path class="bubble" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
    
    <circle class="dot dot-1" cx="7" cy="10" r="1.5" />
    <circle class="dot dot-2" cx="12" cy="10" r="1.5" />
    <circle class="dot dot-3" cx="17" cy="10" r="1.5" />
  </svg>
  <!-- <img src="" class="icon-boat" id="logo-chat-icon-website" width="46" height="46" fill="none" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/> -->
  <!-- Icône fermer -->
  <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<!-- Fenêtre chat -->
<div id="chat-window" role="dialog" aria-label="Assistant virtuel">

  <div class="chat-header">
    <div class="header-top">
      <div class="avatar">
        <img src="" id="logo-chat-window" alt="Logo JPS Nautique" width="34" height="34" style="border-radius: 50%;"/>
      </div>
      <div class="header-info">
        <h3 id="bot-name">Chargement…</h3>
        <div class="status">
          <div class="status-dot"></div>
          <span id="status-text"></span>
        </div>
      </div>
    </div>
    <div class="header-sub" id="bot-subtitle"></div>
  </div>

  <div id="messages">
    <!-- Message de bienvenue -->
    <!-- <div class="msg bot">
      <div class="msg-bubble">
        Bonjour ! 👋 Je suis votre assistant nautique. Je peux vous aider à trouver le bateau idéal, vérifier les disponibilités ou consulter la météo marine.
      </div>
      <div class="msg-time">À l'instant</div>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">🚢 Voir les bateaux</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">📅 Disponibilités</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">🌊 Météo marine</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">💶 Tarifs</button>
      </div>
    </div> -->
  </div>

  <div class="chat-footer">
    <div class="input-row">
      <textarea id="user-input" placeholder="Posez votre question…" rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" aria-label="Envoyer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c8a96e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="footer-note" id="footer-note"></div>
  </div>
</div>

<script>
  
  // ─────────────────────────────────────────
  //  CONFIG LOADER
  // ─────────────────────────────────────────
  const CONFIG_URL = "widget-config.json"; // path to your config file
 
  async function loadConfig() {
    const res = await fetch(CONFIG_URL);
    if (!res.ok) throw new Error("Cannot load widget-config.json");
    return res.json();
  }
 
  function applyConfig(cfg) {
    const root = document.documentElement;
    const t = cfg.theme;
 
    // ── Colors → CSS variables ──
    root.style.setProperty("--primary",       t.primary);
    root.style.setProperty("--primary-light", t.primary_light);
    root.style.setProperty("--accent",        t.accent);
    root.style.setProperty("--accent-light",  t.accent_light);
    root.style.setProperty("--background",    t.background);
    root.style.setProperty("--foam",          t.foam);
    root.style.setProperty("--text-dark",     t.text_dark);
    root.style.setProperty("--text-muted",    t.text_muted);
    root.style.setProperty("--wave",          t.wave);
 
    // ── Layout ──
    const lay = cfg.layout;
    const lay_chat_toggle = cfg.layout_chat_toggle;  
    const win = document.getElementById("chat-window");
    const tog = document.getElementById("chat-toggle");
    const isRight  = lay.position.includes("right");
    const isBottom = lay.position.includes("bottom");
 
    win.style.width  = lay.window_width  + "px";
    win.style.height = lay.window_height + "px";
 
    // Position toggle & window
    tog.style[isBottom ? "bottom" : "top"] = lay_chat_toggle.offset_y + "px";
    tog.style["height"] = lay_chat_toggle.height + "px";
    tog.style[isRight  ? "right"  : "left"] = lay_chat_toggle.offset_x + "px";
    tog.style["width"] = lay_chat_toggle.width + "px";

    win.style[isBottom ? "bottom" : "top"]  = (lay.offset_y) + "px";
    win.style[isRight  ? "right"  : "left"] = lay.offset_x + "px";
 
    // ── Branding ──
    const b = cfg.branding;
    document.getElementById("bot-name").textContent    = b.bot_name;
    document.getElementById("bot-subtitle").textContent = b.bot_subtitle;
    document.getElementById("status-text").textContent  = b.status_text;
    document.getElementById("user-input").placeholder   = b.input_placeholder;
    document.getElementById("footer-note").innerHTML =
      `${b.footer_note} · <a href="${cfg.api.privacy_url}">Politique de confidentialité</a>`;
    document.getElementById("logo-chat-window").src = b.logo_path
    // document.getElementById("logo-chat-icon-website").src = b.logo_chat_icon_website
 
    // ── Welcome message + suggestions ──
    const messagesEl = document.getElementById("messages");
    const welcomeDiv = document.createElement("div");
    welcomeDiv.className = "msg bot";
 
    const chips = cfg.suggestions
      .map(s => `<button class="suggestion-chip" data-text="${s.text}" onclick="sendSuggestion(this)">${s.label}</button>`)
      .join("");
 
    welcomeDiv.innerHTML = `
      <div class="msg-bubble">${b.welcome_message}</div>
      <div class="msg-time">À l'instant</div>
      <div class="suggestions">${chips}</div>
    `;
    messagesEl.appendChild(welcomeDiv);
  }
  
   
  // ─────────────────────────────────────────
  //  CHAT LOGIC
  // ─────────────────────────────────────────
  
  let API_URL = "";
  const SESSION_ID = "session-" + Math.random().toString(36).slice(2);

  const toggle = document.getElementById("chat-toggle");
  const chatWindow = document.getElementById("chat-window");
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const badge = document.getElementById("notif-badge");

  // Ouvrir / fermer
  toggle.addEventListener("click", () => {
    const isOpen = !chatWindow.classList.contains("open");
    if (isOpen) {
      chatWindow.style.display = "flex";
      requestAnimationFrame(() => chatWindow.classList.add("open"));
      inputEl.focus();
      window.parent.postMessage({ type: 'widget-open' }, '*');
    } else {
      chatWindow.classList.remove("open");
      chatWindow.addEventListener("transitionend", function handler(event) {
        if (event.propertyName === "opacity") {
          chatWindow.style.display = "none";
          chatWindow.removeEventListener("transitionend", handler);
        }
      });
      window.parent.postMessage({ type: 'widget-close' }, '*');
    }
    toggle.classList.toggle("open", isOpen);
    badge.classList.add("hidden");
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
  });

  // Envoi avec Entrée (Shift+Entrée = saut de ligne)
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function getTime() {
    return new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
  }

  function appendMessage(content, role) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-bubble">${content}</div>
      <div class="msg-time">${getTime()}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing-indicator";
    div.id = "typing";
    div.innerHTML = "<span></span><span></span><span></span>";
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent.replace(/^[^\w]+/, "").trim();
    sendMessage();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    appendMessage(text, "user");
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: SESSION_ID, message: text }),
      });

      const data = await res.json();
      hideTyping();
      appendMessage(data.response, "bot");

    } catch (err) {
      hideTyping();
      appendMessage("⚠️ Je ne parviens pas à contacter le serveur. Veuillez réessayer.", "bot");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ─────────────────────────────────────────
  //  INIT — load config then boot
  // ─────────────────────────────────────────
  (async () => {
    try {
      const cfg = await loadConfig();
      API_URL = cfg.api.url;
      applyConfig(cfg);
    } catch (err) {
      console.error("Widget config error:", err);
    }
  })();

</script>
</body>
</html>
